<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>灶台 · 跟着步骤学做菜</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 顶部状态栏 -->
  <header class="status-bar">
    <div class="status-inner">
      <a href="#" class="logo" onclick="switchTab('home');return false;">
        <svg class="logo-icon" viewBox="0 0 40 40" width="32" height="32">
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#FF6B35"/>
              <stop offset="100%" stop-color="#C92A2A"/>
            </linearGradient>
          </defs>
          <circle cx="20" cy="20" r="18" fill="none" stroke="url(#logoGrad)" stroke-width="2.5"/>
          <path d="M14 26 Q14 16 20 16 Q26 16 26 26" fill="none" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="20" y1="10" x2="20" y2="14" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="20" cy="8" r="2.5" fill="#FFD93D"/>
        </svg>
        <span class="logo-text">灶台</span>
      </a>
      <div class="status-search">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="搜索菜名或食材..." oninput="handleSearch(this.value)">
      </div>
    </div>
  </header>

  <!-- ==================== 首页视图 ==================== -->
  <main class="page active" id="homePage">
    <!-- 横向分类滚动 -->
    <section class="category-scroll">
      <div class="scroll-inner" id="categoryScroll">
        <button class="category-pill active" data-cat="all" onclick="filterCategory('all')">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
          全部
        </button>
        <button class="category-pill" data-cat="家常菜" onclick="filterCategory('家常菜')">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          家常菜
        </button>
        <button class="category-pill" data-cat="快手菜" onclick="filterCategory('快手菜')">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          快手菜
        </button>
        <button class="category-pill" data-cat="汤羹" onclick="filterCategory('汤羹')">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
          汤羹
        </button>
        <button class="category-pill" data-cat="甜品" onclick="filterCategory('甜品')">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg>
          甜品
        </button>
        <button class="category-pill" data-cat="早餐" onclick="filterCategory('早餐')">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
          早餐
        </button>
      </div>
    </section>

    <!-- 菜谱列表 -->
    <section class="recipe-list-section">
      <div class="list-header">
        <h2 class="list-title" id="sectionTitle">全部菜谱</h2>
        <span class="list-count" id="sectionCount">8 道</span>
      </div>
      <div class="recipe-list" id="recipeList">
        <!-- JS 动态填充 -->
      </div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <svg viewBox="0 0 80 80" width="64" height="64" fill="none" stroke="#D9A48A" stroke-width="2">
          <circle cx="40" cy="40" r="36"/>
          <path d="M28 44 Q40 52 52 44" stroke-linecap="round"/>
          <circle cx="30" cy="32" r="2.5" fill="#D9A48A"/>
          <circle cx="50" cy="32" r="2.5" fill="#D9A48A"/>
        </svg>
        <p>没有找到相关菜谱</p>
        <span>试试其他关键词吧</span>
      </div>
    </section>
  </main>

  <!-- ==================== 分类页 ==================== -->
  <main class="page" id="categoryPage">
    <section class="category-grid-section">
      <h2 class="page-title">菜谱分类</h2>
      <div class="category-grid" id="categoryGrid">
        <!-- JS 动态填充 -->
      </div>
    </section>
  </main>

  <!-- ==================== 收藏页 ==================== -->
  <main class="page" id="favoritesPage">
    <section class="favorites-section">
      <h2 class="page-title">我的收藏</h2>
      <div class="recipe-list" id="favoritesList">
        <!-- JS 动态填充 -->
      </div>
      <div class="empty-state" id="favoritesEmpty" style="display:none;">
        <svg viewBox="0 0 80 80" width="64" height="64" fill="none" stroke="#D9A48A" stroke-width="2">
          <path d="M40 15 C25 15,15 30,15 40 C15 55,40 70,40 70 C40 70,65 55,65 40 C65 30,55 15,40 15Z" stroke-width="2"/>
        </svg>
        <p>还没有收藏菜谱</p>
        <span>点击菜谱卡片上的心形图标即可收藏</span>
      </div>
    </section>
  </main>

  <!-- ==================== 我的页面 ==================== -->
  <main class="page" id="profilePage">
    <section class="profile-section">
      <h2 class="page-title">我的</h2>
      <!-- 用户信息卡片 -->
      <div class="profile-card">
        <div class="profile-avatar" onclick="changeNickname()">
          <svg viewBox="0 0 80 80" width="60" height="60" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="40" cy="25" r="15"/>
            <path d="M15 70 C15 50,25 42,40 42 C55 42,65 50,65 70"/>
          </svg>
        </div>
        <div class="profile-info">
          <div class="profile-nickname" id="profileNickname" onclick="changeNickname()">点击设置昵称</div>
          <div class="profile-stats">
            <div class="stat-item" onclick="toggleProfilePanel('cooked')" style="cursor:pointer;">
              <span class="stat-value" id="myCooked">0</span>
              <span class="stat-label">做过</span>
            </div>
            <div class="stat-item" onclick="toggleProfilePanel('notes')" style="cursor:pointer;">
              <span class="stat-value" id="myNotes">0</span>
              <span class="stat-label">笔记</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 做过的菜 -->
      <div class="cooked-section" id="cookedSection" style="display:none;">
        <h3 class="section-subtitle">做过的菜</h3>
        <div class="cooked-list" id="cookedList">
          <!-- JS 动态填充 -->
        </div>
        <div class="cooked-empty" id="cookedEmpty" style="display:none;">
          <svg viewBox="0 0 80 80" width="48" height="48" fill="none" stroke="#D9A48A" stroke-width="2">
            <circle cx="40" cy="40" r="36"/>
            <path d="M28 44 Q40 52 52 44" stroke-linecap="round"/>
            <circle cx="30" cy="32" r="2.5" fill="#D9A48A"/>
            <circle cx="50" cy="32" r="2.5" fill="#D9A48A"/>
          </svg>
          <p>还没有做过菜</p>
          <span>完成菜谱的最后一步就会自动记录</span>
        </div>
      </div>

      <!-- 我的笔记 -->
      <div class="my-notes-section" id="myNotesSection" style="display:none;">
        <h3 class="section-subtitle">我的笔记</h3>
        <div class="my-notes-list" id="myNotesList">
          <!-- JS 动态填充 -->
        </div>
        <div class="my-notes-empty" id="myNotesEmpty" style="display:none;">
          <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="#D9A48A" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          <p>还没有笔记</p>
          <span>在菜谱详情页记录做菜心得吧</span>
        </div>
      </div>
    </section>
  </main>

  <!-- ==================== 详情页 ==================== -->
  <main class="page" id="detailPage" style="display:none;">
    <!-- 详情页顶部栏 -->
    <div class="detail-topbar">
      <button class="topbar-btn" onclick="switchTab(currentTab)">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="topbar-title" id="topbarTitle">菜谱详情</h1>
      <button class="topbar-btn fav-topbar" id="topbarFav" onclick="toggleFavorite(currentRecipe.id)">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>
    </div>

    <div class="detail-container">
      <!-- 菜谱头部信息 -->
      <header class="detail-header">
        <div class="detail-hero-image" id="detailHeroImage"></div>
        <div class="detail-info">
          <span class="detail-category" id="detailCategory">家常菜</span>
          <h1 class="detail-title" id="detailTitle">菜名</h1>
          <p class="detail-desc" id="detailDesc">描述</p>
          <div class="detail-stats">
            <div class="detail-stat">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
              <span id="detailTime">30 分钟</span>
            </div>
            <div class="detail-stat">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
              </svg>
              <span id="detailDifficulty">简单</span>
            </div>
            <div class="detail-stat">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <span id="detailServings">2 人份</span>
            </div>
          </div>
        </div>
      </header>

      <!-- 食材清单 -->
      <section class="ingredients-section">
        <h2 class="block-title">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#E8590C" stroke-width="2">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          </svg>
          食材清单
        </h2>
        <div class="ingredients-grid" id="ingredientsGrid"></div>
      </section>

      <!-- 烹饪步骤 -->
      <section class="steps-section">
        <div class="steps-header">
          <h2 class="block-title">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#E8590C" stroke-width="2">
              <line x1="8" y1="6" x2="21" y2="6"/>
              <line x1="8" y1="12" x2="21" y2="12"/>
              <line x1="8" y1="18" x2="21" y2="18"/>
              <line x1="3" y1="6" x2="3.01" y2="6"/>
              <line x1="3" y1="12" x2="3.01" y2="12"/>
              <line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
            烹饪步骤
          </h2>
          <div class="progress-wrap">
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>
            <span class="progress-text" id="progressText">0 / 0</span>
          </div>
        </div>

        <div class="steps-scroll" id="stepsScroll">
          <!-- JS 动态填充 -->
        </div>
      </section>

      <!-- 完成提示 -->
      <div class="completion-banner" id="completionBanner" style="display:none;">
        <svg viewBox="0 0 60 60" width="48" height="48">
          <circle cx="30" cy="30" r="28" fill="none" stroke="#2F9E44" stroke-width="3"/>
          <polyline points="18 30 26 38 42 22" fill="none" stroke="#2F9E44" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div>
          <h3>大功告成！</h3>
          <p>这道菜已经完成，快端上桌趁热享用吧</p>
        </div>
      </div>

      <!-- 照片灯箱 -->
      <div class="photo-lightbox" id="photoLightbox" style="display:none;" onclick="closeLightbox()">
        <img id="lightboxImg" src="" alt="">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
      </div>

      <!-- 做菜笔记 -->
      <section class="notes-section">
        <h2 class="block-title">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#E8590C" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          做菜笔记
        </h2>
        <div class="notes-form">
          <textarea id="noteInput" rows="3" placeholder="记录你的做菜心得..."></textarea>
          <div class="notes-form-actions">
            <div class="notes-photo-btn" onclick="document.getElementById('notePhotoInput').click()">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              <span>添加图片</span>
            </div>
            <input type="file" id="notePhotoInput" accept="image/*" style="display:none;" onchange="handleNotePhoto(event)">
            <button class="note-submit" onclick="addNote()">发布笔记</button>
          </div>
          <div class="note-photo-preview" id="notePhotoPreview" style="display:none;">
            <img id="previewImg" src="" alt="">
            <button class="preview-remove" onclick="removeNotePhoto()">×</button>
          </div>
        </div>
        <div class="notes-list" id="notesList"></div>
      </section>
    </div>

    <!-- 底部步骤控制栏 -->
    <div class="step-controls" id="stepControls">
      <button class="ctrl-btn ctrl-prev" id="prevBtn" onclick="navigateStep(-1)" disabled>
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="step-dots" id="stepDots"></div>
      <button class="ctrl-btn ctrl-next" id="nextBtn" onclick="navigateStep(1)">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </div>
  </main>

  <!-- ==================== 步骤计时器浮窗 ==================== -->
  <div class="timer-widget" id="timerWidget" style="display:none;">
    <div class="timer-display" id="timerDisplay">00:00</div>
    <div class="timer-label" id="timerLabel">计时中</div>
    <div class="timer-buttons">
      <button class="timer-btn" id="timerToggle" onclick="toggleTimer()">暂停</button>
      <button class="timer-btn timer-close" onclick="stopTimer()">关闭</button>
    </div>
  </div>

  <!-- ==================== 底部导航栏 ==================== -->
  <nav class="bottom-nav" id="bottomNav">
    <button class="nav-item active" data-tab="home" onclick="switchTab('home')">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>首页</span>
    </button>
    <button class="nav-item" data-tab="category" onclick="switchTab('category')">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      <span>分类</span>
    </button>
    <button class="nav-item" data-tab="favorites" onclick="switchTab('favorites')">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <span>收藏</span>
    </button>
    <button class="nav-item" data-tab="profile" onclick="switchTab('profile')">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>我的</span>
    </button>
  </nav>

  <!-- 一键上滑 -->
  <button class="back-to-top" id="backToTop" onclick="scrollToTop()" title="回到顶部">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="18 15 12 9 6 15"/>
    </svg>
  </button>

  <!-- 底部安全区占位 -->
  <div class="safe-bottom"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
